version: '3.8'

services:
  webapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: floodlevel-api
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=autorack.proxy.rlwy.net;Port=11910;Database=railway;Username=postgres;Password=KCCyGWAEclvuMpgwRwRaFAjCeZQbGJAr
      - Jwt__Key=YourSuperSecretKeyThatShouldBeAtLeast32CharactersLongForHS256Algorithm
      - Jwt__Issuer=FloodLevelHCM
      - Jwt__Audience=FloodLevelHCMUsers
      - Jwt__ExpiresMinutes=60
    restart: unless-stopped
    networks:
      - floodlevel-network

networks:
  floodlevel-network:
    driver: bridge

